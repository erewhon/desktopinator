name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mold \
            libwayland-dev \
            libxkbcommon-dev \
            libudev-dev \
            libinput-dev \
            libgbm-dev \
            libdrm-dev \
            libegl-dev \
            libgles2-mesa-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libseat-dev \
            libpixman-1-dev \
            libxcb1-dev \
            libxcb-composite0-dev \
            libxcb-xfixes0-dev \
            libxcb-xinput-dev \
            libxcb-render0-dev \
            libxcb-shm0-dev \
            libx11-xcb-dev \
            libx11-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libavdevice-dev \
            libavfilter-dev \
            libswresample-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy (includes build)
        run: cargo clippy --all-targets -- -D warnings
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

      - name: Test
        run: cargo test
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
