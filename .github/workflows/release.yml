name: Release Build

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libudev-dev \
            libinput-dev \
            libgbm-dev \
            libdrm-dev \
            libegl-dev \
            libgles2-mesa-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libseat-dev \
            libpixman-1-dev \
            libxcb1-dev \
            libxcb-composite0-dev \
            libxcb-xfixes0-dev \
            libxcb-xinput-dev \
            libxcb-render0-dev \
            libxcb-shm0-dev \
            libx11-xcb-dev \
            libx11-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libavdevice-dev \
            libavfilter-dev \
            libswresample-dev

      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libwayland-dev:arm64 \
            libxkbcommon-dev:arm64 \
            libudev-dev:arm64 \
            libinput-dev:arm64 \
            libgbm-dev:arm64 \
            libdrm-dev:arm64 \
            libegl-dev:arm64 \
            libgles2-mesa-dev:arm64 \
            libpipewire-0.3-dev:arm64 \
            libspa-0.2-dev:arm64 \
            libseat-dev:arm64 \
            libpixman-1-dev:arm64 \
            libxcb1-dev:arm64 \
            libx11-xcb-dev:arm64 \
            libx11-dev:arm64 \
            libavcodec-dev:arm64 \
            libavformat-dev:arm64 \
            libavutil-dev:arm64 \
            libswscale-dev:arm64 \
            libavdevice-dev:arm64 \
            libavfilter-dev:arm64 \
            libswresample-dev:arm64 || true
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binaries
        run: |
          ARCH=$(echo "${{ matrix.target }}" | cut -d- -f1)
          for bin in desktopinator dinatorctl; do
            cp target/${{ matrix.target }}/release/$bin ${bin}-linux-${ARCH}
          done

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktopinator-${{ matrix.target }}
          path: |
            desktopinator-linux-*
            dinatorctl-linux-*

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: ${{ always() && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'release') }}
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/ || echo "No artifacts found"

      - name: Create Release
        if: ${{ hashFiles('artifacts/*') != '' }}
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: artifacts/*
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' }}
    steps:
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${{ github.event.release.tag_name }}" | sed 's/^version=v/version=/' >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for release assets
        run: sleep 10

      - name: Download release binaries and compute checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://github.com/erewhon/desktopinator/releases/download/v${VERSION}"
          for binary in desktopinator-linux-x86_64 desktopinator-linux-aarch64 dinatorctl-linux-x86_64 dinatorctl-linux-aarch64; do
            curl -fsSL -o "$binary" "${BASE_URL}/${binary}" || echo "WARN: $binary not found"
            if [ -f "$binary" ]; then
              sha256sum "$binary" | awk '{print $1}' > "${binary}.sha256"
            fi
          done

      - name: Generate formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_X86=$(cat desktopinator-linux-x86_64.sha256 2>/dev/null || echo "PLACEHOLDER")
          SHA_ARM=$(cat desktopinator-linux-aarch64.sha256 2>/dev/null || echo "PLACEHOLDER")
          SHA_CTL_X86=$(cat dinatorctl-linux-x86_64.sha256 2>/dev/null || echo "PLACEHOLDER")
          SHA_CTL_ARM=$(cat dinatorctl-linux-aarch64.sha256 2>/dev/null || echo "PLACEHOLDER")

          cat > desktopinator.rb << FORMULA
          class Desktopinator < Formula
            desc "Wayland tiling compositor for remote desktop (RDP/VNC)"
            homepage "https://github.com/erewhon/desktopinator"
            version "${VERSION}"
            license "MIT"

            on_linux do
              on_arm do
                url "https://github.com/erewhon/desktopinator/releases/download/v${VERSION}/desktopinator-linux-aarch64"
                sha256 "${SHA_ARM}"
              end

              on_intel do
                url "https://github.com/erewhon/desktopinator/releases/download/v${VERSION}/desktopinator-linux-x86_64"
                sha256 "${SHA_X86}"
              end
            end

            resource "dinatorctl" do
              on_linux do
                on_arm do
                  url "https://github.com/erewhon/desktopinator/releases/download/v${VERSION}/dinatorctl-linux-aarch64"
                  sha256 "${SHA_CTL_ARM}"
                end

                on_intel do
                  url "https://github.com/erewhon/desktopinator/releases/download/v${VERSION}/dinatorctl-linux-x86_64"
                  sha256 "${SHA_CTL_X86}"
                end
              end
            end

            def install
              if Hardware::CPU.arm?
                bin.install "desktopinator-linux-aarch64" => "desktopinator"
              else
                bin.install "desktopinator-linux-x86_64" => "desktopinator"
              end

              resource("dinatorctl").stage do
                if Hardware::CPU.arm?
                  bin.install "dinatorctl-linux-aarch64" => "dinatorctl"
                else
                  bin.install "dinatorctl-linux-x86_64" => "dinatorctl"
                end
              end
            end

            test do
              assert_match "desktopinator", shell_output("#{bin}/desktopinator --help", 2)
            end
          end
          FORMULA

          sed -i 's/^          //' desktopinator.rb

      - name: Update homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/erewhon/homebrew-tap.git
          mkdir -p homebrew-tap/Formula
          cp desktopinator.rb homebrew-tap/Formula/desktopinator.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/desktopinator.rb
          git diff --cached --quiet || git commit -m "Brew formula update for desktopinator version v${{ steps.version.outputs.version }}"
          git push
