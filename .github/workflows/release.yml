name: Release Build

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libudev-dev \
            libinput-dev \
            libgbm-dev \
            libdrm-dev \
            libegl-dev \
            libgles2-mesa-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libseat-dev \
            libpixman-1-dev \
            libxcb1-dev \
            libxcb-composite0-dev \
            libxcb-xfixes0-dev \
            libxcb-xinput-dev \
            libxcb-render0-dev \
            libxcb-shm0-dev \
            libx11-xcb-dev \
            libx11-dev

      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libwayland-dev:arm64 \
            libxkbcommon-dev:arm64 \
            libudev-dev:arm64 \
            libinput-dev:arm64 \
            libgbm-dev:arm64 \
            libdrm-dev:arm64 \
            libegl-dev:arm64 \
            libgles2-mesa-dev:arm64 \
            libpipewire-0.3-dev:arm64 \
            libspa-0.2-dev:arm64 \
            libseat-dev:arm64 \
            libpixman-1-dev:arm64 \
            libxcb1-dev:arm64 \
            libx11-xcb-dev:arm64 \
            libx11-dev:arm64 || true
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binaries
        run: |
          ARCH=$(echo "${{ matrix.target }}" | cut -d- -f1)
          for bin in desktopinator dinatorctl; do
            cp target/${{ matrix.target }}/release/$bin ${bin}-linux-${ARCH}
          done

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktopinator-${{ matrix.target }}
          path: |
            desktopinator-linux-*
            dinatorctl-linux-*

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: ${{ always() && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'release') }}
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/ || echo "No artifacts found"

      - name: Create Release
        if: ${{ hashFiles('artifacts/*') != '' }}
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: artifacts/*
          generate_release_notes: true
